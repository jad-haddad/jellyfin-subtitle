name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PLUGIN_NAME: jellyfin-plugin-subtitle-generator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: |
          cd Jellyfin.Plugin.SubtitleGenerator
          dotnet restore
          dotnet build --configuration Release
          dotnet publish --configuration Release --output ../build

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p package
          cp build/Jellyfin.Plugin.SubtitleGenerator.dll package/
          cp meta.json package/
          cd package
          zip -r "../${PLUGIN_NAME}_${VERSION}.zip" .
          cd ..
          ls -la "${PLUGIN_NAME}_${VERSION}.zip"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_NAME }}_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute checksum from release asset
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${PLUGIN_NAME}_${VERSION}.zip"
          
          echo "Downloading release asset to compute checksum..."
          echo "URL: $RELEASE_URL"
          
          # Wait for release to be available
          sleep 5
          
          # Download the actual release asset and compute MD5
          curl -sL "$RELEASE_URL" -o /tmp/downloaded.zip
          
          if [ -f /tmp/downloaded.zip ]; then
            CHECKSUM=$(md5sum /tmp/downloaded.zip | awk '{print $1}')
            echo "Computed MD5 checksum: $CHECKSUM"
            echo "$CHECKSUM" > /tmp/checksum.txt
          else
            echo "Failed to download release asset"
            exit 1
          fi

      - name: Update plugins.json manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${PLUGIN_NAME}_${VERSION}.zip"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CHECKSUM=$(cat /tmp/checksum.txt)
          
          echo "Updating plugins.json with:"
          echo "  Version: $VERSION"
          echo "  URL: $RELEASE_URL"
          echo "  MD5: $CHECKSUM"
          
          # Generate updated plugins.json
          jq --arg version "$VERSION" \
             --arg url "$RELEASE_URL" \
             --arg ts "$TIMESTAMP" \
             --arg checksum "$CHECKSUM" \
             '.[0].versions = [{version: $version, changelog: ("Release " + $version), targetAbi: "10.11.0", sourceUrl: $url, checksum: $checksum, timestamp: $ts}]' \
             plugins.json > /tmp/plugins.json.new
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch main branch and checkout
          git fetch origin main
          git checkout -B main origin/main
          
          # Apply updates to both root and docs/
          cp /tmp/plugins.json.new plugins.json
          cp /tmp/plugins.json.new docs/plugins.json
          
          git add plugins.json docs/plugins.json
          git commit -m "Update plugins.json for $GITHUB_REF_NAME with correct MD5 checksum" || echo "Nothing to commit"
          git push origin main
